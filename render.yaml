services:
  # Backend API Service
  - type: web
    name: f-mobile-backend
    runtime: node
    plan: free
    buildCommand: cd f-mobile-backend && npm install
    startCommand: cd f-mobile-backend && npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 5000
      - key: MONGODB_URI
        value: mongodb+srv://aziz:U4yGi7ej0ePGGyXW@cluster0.k2fswkg.mongodb.net/f-mobile?retryWrites=true&w=majority&authSource=admin&appName=Cluster0
      - key: JWT_SECRET
        value: f-mobile-super-secret-key-2026-production
      - key: JWT_EXPIRE
        value: 7d
      - key: ADMIN_USERNAME
        value: admin
      - key: ADMIN_PASSWORD
        value: 101110
      - key: telegram_bot_token
        value: 8021647365:AAEuiiKcK63kIWJcJXSlmj4lTtmyai5Hfog
      - key: CORS_ORIGIN
        value: *
    healthCheckPath: /api/health
    healthCheckInterval: 30

  # Frontend Service
  - type: web
    name: f-mobile-frontend
    runtime: node
    plan: free
    buildCommand: cd f-mobile && npm install && npm run build --webpack
    startCommand: cd f-mobile && npm start
    envVars:
      - key: NEXT_PUBLIC_API_URL
        value: https://f-mobile-backend.onrender.com/api
    healthCheckPath: /
    healthCheckInterval: 30
