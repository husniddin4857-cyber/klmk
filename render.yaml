services:
  # Backend API Service
  - type: web
    name: f-mobile-backend
    runtime: node
    plan: free
    buildCommand: cd f-mobile-backend && npm install
    startCommand: cd f-mobile-backend && npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 5000
      - key: MONGODB_URI
        fromDatabase:
          name: f-mobile-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRE
        value: 7d
      - key: ADMIN_USERNAME
        value: admin
      - key: ADMIN_PASSWORD
        generateValue: true
      - key: CORS_ORIGIN
        value: https://f-mobile-frontend.onrender.com
      - key: telegram_bot_token
        sync: false
    healthCheckPath: /api/health
    healthCheckInterval: 30

  # Frontend Service
  - type: web
    name: f-mobile-frontend
    runtime: node
    plan: free
    buildCommand: cd f-mobile && npm install && npm run build
    startCommand: cd f-mobile && npm start
    envVars:
      - key: NEXT_PUBLIC_API_URL
        value: https://f-mobile-backend.onrender.com/api
    healthCheckPath: /
    healthCheckInterval: 30

  # MongoDB Database
  - type: pserv
    name: f-mobile-db
    runtime: mongodb
    plan: free
    ipAllowList: []
